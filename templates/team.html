<html>

    <style>
        .logo {
            position: absolute;

            right: 10px;
        }
        body {
            font-family: Arial;
            
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            padding: 20px;
            width: 220px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        .card img {
            width: 100%;
            height: 200px;
            border-radius: 10px;
            object-fit: cover;
        }

        .name {
            font-size: 18px;
            font-weight: bold;
            margin-top: 10px;
        }

        .roll {
            color: gray;
        }
         button {
            width: 150px;
            height: 35px;
            font-size: 16px;
            cursor: pointer;
        }

    </style>
</head>
